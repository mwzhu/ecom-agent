[project]
name = "ecom-shared-schemas"
version = "0.1.0"
description = "Shared pydantic schemas for the ecommerce agent platform."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ecom_shared"]

