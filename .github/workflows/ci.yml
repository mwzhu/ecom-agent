name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --frozen --all-packages --all-groups
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest

  console:
    name: Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ecom-agent/console typecheck

  eval-gate:
    name: Order Exception eval gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --frozen --all-packages --all-groups
      - name: Checkout base branch for regression baseline
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: .eval-base
      - name: Compute base branch pass rate
        if: ${{ github.event_name == 'pull_request' }}
        id: baseline
        working-directory: .eval-base
        run: |
          uv sync --frozen --all-packages --all-groups
          RATE=$(uv run python scripts/run_langsmith_eval_gate.py --json | python -c 'import json,sys; print(json.load(sys.stdin)["pass_rate"])')
          echo "pass_rate=${RATE}" >> "$GITHUB_OUTPUT"
      - name: Run deterministic regression gate
        run: uv run python scripts/run_langsmith_eval_gate.py
        env:
          EVAL_BASELINE_PASS_RATE: ${{ steps.baseline.outputs.pass_rate }}
      - name: Sync LangSmith dataset and optional judge scores
        if: ${{ vars.RUN_LANGSMITH_EVALS == 'true' }}
        run: uv run python scripts/run_langsmith_eval_gate.py --judge
        env:
          RUN_LANGSMITH_EVALS: "true"
          EVAL_JUDGE_ENABLED: ${{ vars.EVAL_JUDGE_ENABLED }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
